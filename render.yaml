services:
  - type: web
    name: practicepanther-mcp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PP_CLIENT_ID
        sync: false
      - key: PP_CLIENT_SECRET
        sync: false
      - key: PP_REDIRECT_URI
        sync: false
      - key: MCP_CLIENT_ID
        sync: false
      - key: MCP_CLIENT_SECRET
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: ALLOWED_EMAIL_DOMAIN
        value: "anlawfirm.com"
      - key: MCP_ALLOWED_HOSTS
        value: "practicepanther-mcp.onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MALLOC_TRIM_THRESHOLD_
        value: "65536"

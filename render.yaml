services:
  - type: web
    name: practicepanther-mcp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PP_CLIENT_ID
        sync: false
      - key: PP_CLIENT_SECRET
        sync: false
      - key: PP_REDIRECT_URI
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
